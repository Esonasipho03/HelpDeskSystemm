{% extends "base_technician_dashboard.html" %}

{% block title %}
Edit Article
{% endblock %}

{% block content %}

<div class="container">

    <h2>Edit Knowledge Base Article</h2>

    <form method="post">

        {% csrf_token %}

        {{ form.as_p }}

        <button class="btn btn-warning">
            Update Article
        </button>

        <a href="{% url 'knowledge_base' %}"
           class="btn btn-secondary">
            Cancel
        </a>

    </form>

</div>

{% endblock %}
